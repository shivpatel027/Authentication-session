<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — AuthKit</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
      --accent: #6c63ff; --accent-glow: rgba(108,99,255,0.25);
      --text: #f0f0f5; --muted: #6b6b80;
      --error: #ff4d6d; --success: #3dffa0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); font-family: 'DM Sans', sans-serif;
      color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px; opacity: 0.4;
    }
    .bg-glow {
      position: fixed; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(108,99,255,0.12), transparent 70%);
      top: -100px; left: 50%; transform: translateX(-50%);
      z-index: 0; pointer-events: none;
    }
    .card {
      position: relative; z-index: 1;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 44px;
      width: 100%; max-width: 420px;
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(108,99,255,0.08);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
      letter-spacing: -0.5px; color: var(--text); margin-bottom: 32px;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-dot {
      width: 10px; height: 10px; background: var(--accent);
      border-radius: 50%; box-shadow: 0 0 12px var(--accent);
    }
    h1 {
      font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700;
      letter-spacing: -0.5px; margin-bottom: 6px;
    }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .field { margin-bottom: 18px; }
    label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 8px;
    }
    input {
      width: 100%; padding: 13px 16px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 15px; transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input::placeholder { color: var(--muted); }
    .password-hint {
      font-size: 11px; color: var(--muted); margin-top: 6px;
    }
    .strength-bar {
      height: 3px; background: var(--border);
      border-radius: 2px; margin-top: 8px; overflow: hidden;
    }
    .strength-fill {
      height: 100%; width: 0%; border-radius: 2px;
      transition: width 0.3s, background 0.3s;
    }
    .btn {
      width: 100%; padding: 14px; background: var(--accent);
      color: #fff; border: none; border-radius: 10px; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600;
      letter-spacing: 0.3px; margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn:hover { opacity: 0.9; box-shadow: 0 4px 30px rgba(108,99,255,0.45); }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .divider {
      text-align: center; color: var(--muted); font-size: 13px;
      margin: 22px 0; position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: 42%; height: 1px; background: var(--border);
    }
    .divider::before { left: 0; } .divider::after { right: 0; }
    .footer-text { text-align: center; font-size: 14px; color: var(--muted); }
    .footer-text a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .footer-text a:hover { text-decoration: underline; }
    .alert {
      padding: 12px 16px; border-radius: 8px;
      font-size: 13px; margin-bottom: 18px; display: none;
    }
    .alert.error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); color: var(--error); }
    .alert.success { background: rgba(61,255,160,0.1); border: 1px solid rgba(61,255,160,0.3); color: var(--success); }
    .alert.show { display: block; animation: fadeUp 0.3s ease; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="card">
    <div class="logo"><div class="logo-dot"></div>AuthKit</div>
    <h1>Create account</h1>
    <p class="subtitle">Start your journey today</p>
    <div class="alert error" id="errorAlert"></div>
    <div class="alert success" id="successAlert"></div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="johndoe" />
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" oninput="checkStrength(this.value)" />
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="password-hint" id="strengthLabel">At least 8 characters</div>
    </div>
    <button class="btn" id="signupBtn" onclick="handleSignup()">Create account</button>
    <div class="divider">or</div>
    <div class="footer-text">Already have an account? <a href="/login">Sign in</a></div>
  </div>

  <script>
    const API = 'http://localhost:3000';

    function showAlert(type, msg) {
      const el = document.getElementById(type === 'error' ? 'errorAlert' : 'successAlert');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    function checkStrength(val) {
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { w: '0%',   color: 'transparent', text: 'At least 8 characters' },
        { w: '25%',  color: '#ff4d6d',     text: 'Weak' },
        { w: '50%',  color: '#ff9f43',     text: 'Fair' },
        { w: '75%',  color: '#ffd32a',     text: 'Good' },
        { w: '100%', color: '#3dffa0',     text: 'Strong' },
      ];
      fill.style.width = levels[score].w;
      fill.style.background = levels[score].color;
      label.textContent = levels[score].text;
      label.style.color = levels[score].color || 'var(--muted)';
    }

    async function handleSignup() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('signupBtn');

      if (!username || !email || !password) return showAlert('error', 'Please fill in all fields');
      if (password.length < 8) return showAlert('error', 'Password must be at least 8 characters');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Creating account...';

      try {
        const res = await fetch(`${API}/users/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert('error', data.error || 'Signup failed');
        } else {
          showAlert('success', 'Account created! Redirecting to login...');
          setTimeout(() => window.location.href = '/login', 1200);
        }
      } catch (err) {
        showAlert('error', 'Could not connect to server');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Create account';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
  </script>
</body>
</html>
