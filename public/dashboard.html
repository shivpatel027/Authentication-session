<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — AuthKit</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #16161f;
      --border: #1e1e2e; --accent: #6c63ff; --accent-glow: rgba(108,99,255,0.25);
      --text: #f0f0f5; --muted: #6b6b80; --error: #ff4d6d; --success: #3dffa0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px; opacity: 0.3; pointer-events: none;
    }
    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 240px;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 28px 20px; z-index: 10;
    }
    .logo {
      font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
      letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px;
      margin-bottom: 40px;
    }
    .logo-dot { width: 9px; height: 9px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
    .nav { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 10px; cursor: pointer;
      font-size: 14px; font-weight: 500; color: var(--muted);
      transition: all 0.15s; text-decoration: none;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(108,99,255,0.15); color: var(--accent); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { border-top: 1px solid var(--border); padding-top: 20px; }
    .user-chip {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 10px;
      background: var(--surface2); margin-bottom: 10px;
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      color: #fff; flex-shrink: 0;
    }
    .user-info { overflow: hidden; }
    .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role {
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .logout-btn {
      width: 100%; padding: 10px; background: transparent;
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 13px; cursor: pointer; transition: all 0.15s;
    }
    .logout-btn:hover { border-color: var(--error); color: var(--error); background: rgba(255,77,109,0.05); }
    /* Main */
    .main { margin-left: 240px; padding: 40px; position: relative; z-index: 1; }
    .page-header { margin-bottom: 36px; }
    .page-header h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .page-header p { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 36px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px;
      animation: fadeUp 0.4s ease both;
    }
    .stat-card:nth-child(2) { animation-delay: 0.05s; }
    .stat-card:nth-child(3) { animation-delay: 0.1s; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .section-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .info-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px; animation: fadeUp 0.4s ease 0.15s both;
    }
    .info-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .info-row:last-child { border-bottom: none; }
    .info-key { font-size: 13px; color: var(--muted); }
    .info-val { font-size: 14px; font-weight: 500; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px; font-size: 11px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge.user { background: rgba(108,99,255,0.15); color: var(--accent); }
    .badge.admin { background: rgba(61,255,160,0.15); color: var(--success); }
    .loading { color: var(--muted); font-size: 14px; padding: 40px 0; text-align: center; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <aside class="sidebar">
    <div class="logo"><div class="logo-dot"></div>AuthKit</div>
    <nav class="nav">
      <a class="nav-item active" href="/dashboard"><span class="icon">⬡</span> Dashboard</a>
      <a class="nav-item" href="/profile"><span class="icon">◎</span> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar" id="avatarInitial">?</div>
        <div class="user-info">
          <div class="user-name" id="sidebarName">Loading...</div>
          <div class="user-role" id="sidebarRole">—</div>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1 id="welcomeMsg">Welcome back</h1>
      <p>Here's what's going on with your account</p>
    </div>
    <div class="cards-grid">
      <div class="stat-card">
        <div class="stat-label">Account Status</div>
        <div class="stat-value" style="color: var(--success)">Active</div>
        <div class="stat-sub">All systems normal</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Role</div>
        <div class="stat-value" id="roleValue">—</div>
        <div class="stat-sub">Access level</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Member Since</div>
        <div class="stat-value" id="memberSince" style="font-size:18px">—</div>
        <div class="stat-sub">Account age</div>
      </div>
    </div>
    <div class="section-title">Account Details</div>
    <div class="info-card" id="infoCard">
      <div class="loading">Loading your details...</div>
    </div>
  </main>

  <script src="/public/auth.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');

    async function loadProfile() {
      const res = await authFetch(`${API}/users/me`);
      if (!res) return;
      const data = await res.json();
      const user = data.user;

      // Sidebar
      document.getElementById('sidebarName').textContent = user.username;
      document.getElementById('sidebarRole').textContent = user.role;
      document.getElementById('avatarInitial').textContent = user.username[0].toUpperCase();
      document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.username}`;
      document.getElementById('roleValue').textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);

      const joined = new Date(user.created_at);
      document.getElementById('memberSince').textContent = joined.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });

      document.getElementById('infoCard').innerHTML = `
        <div class="info-row">
          <span class="info-key">User ID</span>
          <span class="info-val" style="font-size:12px;color:var(--muted);font-family:monospace">${user.id}</span>
        </div>
        <div class="info-row">
          <span class="info-key">Username</span>
          <span class="info-val">${user.username}</span>
        </div>
        <div class="info-row">
          <span class="info-key">Email</span>
          <span class="info-val">${user.email}</span>
        </div>
        <div class="info-row">
          <span class="info-key">Role</span>
          <span class="info-val"><span class="badge ${user.role}">${user.role}</span></span>
        </div>
      `;
    }

    loadProfile();
  </script>
</body>
</html>
